version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    environment:
      - FLASK_ENV=production
      - SECRET_KEY=change-this-in-production
      - JWT_SECRET_KEY=change-this-in-production
      - DATABASE_URL=postgresql://sms_user:change_this_password@db:5432/student_management
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - db
    networks:
      - sms-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
    depends_on:
      - backend
    networks:
      - sms-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - sms-network

  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=student_management
      - POSTGRES_USER=sms_user
      - POSTGRES_PASSWORD=change_this_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sms-network

volumes:
  postgres_data:

networks:
  sms-network:
    driver: bridge